<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Princess Tanya 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ui-bg: rgba(255,255,255,0.18);
    --ui-border: rgba(255,255,255,0.35);
    --ui-text: #fff;
    --ui-subtext: rgba(255,255,255,0.82);
    --ui-shadow: 0 8px 48px rgba(0,0,0,0.18);
    --ui-accent: #ffb347;
    --ui-tail-bg: rgba(255,255,255,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background-color: #030814;
    transition: background-color 2s ease;
  }

  /* ── ENVIRONMENT LAYERS ── */
  
  /* Star Map Background */
  #starmap {
    position: fixed; inset: 0;
    z-index: -4;
    width: 100%; height: 100%;
    border: none;
    pointer-events: auto;
    transition: opacity 2s ease;
  }

  /* Atmosphere (Dynamic Gradient) */
  #atmosphere {
    position: fixed; inset: 0;
    z-index: -3;
    pointer-events: none;
    transition: background 2s ease, opacity 1.5s ease;
  }

  /* Warm Fire Glow from the bottom (Night/Evening only) */
  #warm-glow {
    position: fixed;
    bottom: -10vh; left: 50%;
    transform: translateX(-50%);
    width: 120vw; height: 60vh;
    background: radial-gradient(ellipse at bottom, rgba(255, 110, 0, 0.4) 0%, rgba(200, 50, 0, 0.15) 40%, transparent 70%);
    z-index: -2;
    pointer-events: none;
    transition: opacity 2s ease;
  }

  /* ── DYNAMIC TIME-OF-DAY STYLES ── */
  
  /* Morning */
  body.morning { background-color: #fcd3a5; }
  body.morning #atmosphere { background: linear-gradient(to bottom, #fcd3a5 0%, #f9a26c 40%, #ffecd2 100%); opacity: 0.9; }
  body.morning #starmap, body.morning #warm-glow { opacity: 0; }

  /* Day */
  body.day { background-color: #87ceeb; }
  body.day #atmosphere { background: linear-gradient(to bottom, #87ceeb 0%, #b8e4f7 55%, #e0f4fc 100%); opacity: 0.95; }
  body.day #starmap, body.day #warm-glow { opacity: 0; }

  /* Evening */
  body.evening { background-color: #1a1a2e; }
  body.evening #atmosphere { background: linear-gradient(to bottom, #1a1a2e 0%, #e05c2e 40%, #f5a623 80%, #ffecd2 100%); opacity: 0.85; }
  body.evening #starmap { opacity: 0.4; }
  body.evening #warm-glow { opacity: 0.6; }

  /* Night */
  body.night { background-color: #030814; }
  body.night #atmosphere { background: linear-gradient(to bottom, rgba(3, 8, 20, 0.4) 0%, rgba(12, 28, 64, 0.6) 60%, rgba(26, 26, 46, 0.9) 100%); opacity: 1; }
  body.night #starmap { opacity: 0.85; }
  body.night #warm-glow { opacity: 1; }

  /* Sun & Moon */
  #moon {
    position: fixed; top: 8vh; right: 12vw;
    width: 54px; height: 54px; border-radius: 50%;
    background: radial-gradient(circle at 35% 38%, #fff9c4, #ffe082);
    box-shadow: 0 0 32px 10px rgba(255,230,100,0.28), 0 0 64px 20px rgba(255,200,50,0.12);
    z-index: -2; pointer-events: none;
    opacity: 0; transition: opacity 2s ease;
  }
  body.night #moon { opacity: 1; }
  body.evening #moon { opacity: 0.6; }

  #sun {
    position: fixed; top: 10vh; right: 14vw;
    width: 58px; height: 58px; border-radius: 50%;
    background: radial-gradient(circle, #fff9c4, #ffb347 70%);
    box-shadow: 0 0 40px 14px rgba(255,180,60,0.35), 0 0 80px 30px rgba(255,160,30,0.14);
    z-index: -2; pointer-events: none;
    opacity: 0; transition: opacity 2s ease;
  }
  body.morning #sun { opacity: 1; }
  body.day #sun { opacity: 1; top: 8vh; right: 16vw; }

  /* ── REAL PHOTO LANDSCAPE ── */
  #landscape-container {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    height: 45vh; /* Adjust this to make the photo taller or shorter */
    z-index: -1;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  
    #landscape-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: bottom center;
    /* Removed the 2-second filter transition that crashes mobile browsers */
  }

  /* Simplified Mobile-Safe Photo Lighting */
  body.morning #landscape-img { 
    filter: brightness(0.7) sepia(0.3); 
  }
  body.day #landscape-img { 
    filter: none; /* Normal photo during the day */
  }
  body.evening #landscape-img { 
    filter: brightness(0.5); /* Just making it darker so the browser doesn't crash */
  }
  body.night #landscape-img { 
    filter: brightness(0.2) drop-shadow(0 -5px 15px rgba(0,0,0,0.5)); 
  }


  /* ── SPEECH BUBBLE UI (Dynamic Light/Dark) ── */
  #ui-container {
    position: fixed;
    z-index: 10;
    top: 35%; /* Moved up slightly to accommodate the photo */
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(480px, 92vw);
    background: var(--ui-bg);
    backdrop-filter: blur(15px) saturate(160%);
    -webkit-backdrop-filter: blur(15px) saturate(160%);
    border: 1.5px solid var(--ui-border);
    border-radius: 26px;
    padding: 38px 38px 44px;
    box-shadow: var(--ui-shadow);
    color: var(--ui-text);
    transition: background 1.5s ease, border 1.5s ease, color 1.5s ease;
  }

  #ui-container::after {
    content: ''; position: absolute;
    bottom: -22px; left: 50%; transform: translateX(-50%);
    border-left: 18px solid transparent; border-right: 18px solid transparent;
    border-top: 22px solid var(--ui-tail-bg);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    transition: border-top-color 1.5s ease;
  }

  /* Dark UI (night/evening) */
  body.night #ui-container, body.evening #ui-container {
    --ui-bg: rgba(10, 15, 35, 0.65);
    --ui-border: rgba(255, 255, 255, 0.15);
    --ui-shadow: 0 12px 64px rgba(0, 0, 0, 0.6);
    --ui-tail-bg: rgba(10, 15, 35, 0.65);
    --ui-text: #fff;
    --ui-subtext: rgba(255, 255, 255, 0.82);
    --ui-accent: #ff8c00;
  }
  
  /* Light UI (morning/day) */
  body.morning #ui-container, body.day #ui-container {
    --ui-bg: rgba(255,255,255,0.45);
    --ui-border: rgba(255,255,255,0.7);
    --ui-shadow: 0 8px 48px rgba(0,0,0,0.12);
    --ui-tail-bg: rgba(255,255,255,0.45);
    --ui-text: #1a1a2e;
    --ui-subtext: rgba(30,30,60,0.8);
    --ui-accent: #e05c2e;
  }

  /* ── COUNTDOWN STATE ── */
  #state-countdown { display: block; }
  #state-celebration { display: none; }

  .pre-label {
    font-size: 0.78rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ui-subtext);
    margin-bottom: 10px; text-align: center;
  }

  .countdown-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: var(--ui-text); line-height: 1.2;
    margin-bottom: 28px; text-align: center;
  }
  .countdown-title span { color: var(--ui-accent); }

  .timer-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
  }

  .timer-unit {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px; padding: 14px 8px 12px; text-align: center;
  }
  body.morning .timer-unit, body.day .timer-unit {
    background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1);
  }

  .timer-num {
    font-family: 'Pacifico', cursive; font-size: clamp(1.6rem, 5vw, 2.2rem);
    line-height: 1; color: var(--ui-text); display: block;
  }
  .timer-label {
    font-size: 0.62rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ui-subtext);
    display: block; margin-top: 5px;
  }

  .countdown-note {
    font-size: 0.85rem; color: var(--ui-subtext);
    text-align: center; line-height: 1.6; margin-top: 15px;
  }

  /* ── CELEBRATION STATE ── */
  .celebration-header {
    font-family: 'Pacifico', cursive; font-size: clamp(1.8rem, 6vw, 2.8rem);
    line-height: 1.2; color: var(--ui-text);
    margin-bottom: 18px; text-align: center;
  }

  .message-box {
    font-size: clamp(0.95rem, 2.5vw, 1.1rem); color: var(--ui-subtext);
    line-height: 1.8; min-height: 80px; margin-bottom: 26px; text-align: center;
  }

  .cursor {
    display: inline-block; width: 2px; height: 1.1em; background: var(--ui-accent);
    vertical-align: middle; margin-left: 2px; animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .cta-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--ui-accent); color: #fff;
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 0.95rem; letter-spacing: 0.06em;
    border: none; border-radius: 50px; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 1.5s ease;
    text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
  .cta-btn:active { transform: translateY(0); }

  /* ── FLOATING STARS (ambient) ── */
  .ambient-star {
    position: fixed; border-radius: 50%; background: #fff;
    pointer-events: none; z-index: -2;
    animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    opacity: 0; transition: opacity 2s ease;
  }
  body.night .ambient-star, body.evening .ambient-star { opacity: var(--op, 0.7); }

  @keyframes twinkle {
    from { transform: scale(1); opacity: var(--op, 0.8); box-shadow: 0 0 5px 1px rgba(255,255,255,0.4); }
    to { transform: scale(1.8); opacity: 0.2; box-shadow: 0 0 10px 2px rgba(255,255,255,0.1); }
  }

  /* entry animation */
  #ui-container {
    animation: floatIn 1.2s cubic-bezier(0.16,1,0.3,1) both; animation-delay: 0.3s;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translate(-50%, -40%) scale(0.95); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>

<!-- The Live Sky Map -->
<iframe id="starmap"
  src="https://virtualsky.lco.global/embed/index.html?longitude=85.62&latitude=20.18&projection=polar&showdate=false&showbuttons=false&live=true&background=000000&fontsize=12&gridlines_az=false&starcolor=ffffff"
  allowfullscreen>
</iframe>

<div id="atmosphere"></div>
<div id="warm-glow"></div>

<div id="sun"></div>
<div id="moon"></div>

<!-- Your Real Photo Container -->
<div id="landscape-container">
  <img src="besties.png" alt="Besties" id="landscape-img">
</div>

<!-- The Speech Bubble UI -->
<div id="ui-container">
  
  <div id="state-countdown">
    <p class="pre-label">✦ A special day is coming ✦</p>
    <h1 class="countdown-title">Counting down to<br><span>June 12th 🎂</span></h1>
    <div class="timer-grid">
      <div class="timer-unit">
        <span class="timer-num" id="cd-days">--</span>
        <span class="timer-label">Days</span>
      </div>
      <div class="timer-unit">
        <span class="timer-num" id="cd-hours">--</span>
        <span class="timer-label">Hours</span>
      </div>
      <div class="timer-unit">
        <span class="timer-num" id="cd-mins">--</span>
        <span class="timer-label">Mins</span>
      </div>
      <div class="timer-unit">
        <span class="timer-num" id="cd-secs">--</span>
        <span class="timer-label">Secs</span>
      </div>
    </div>
    <p class="countdown-note">Something wonderful is being prepared for you ✨</p>
  </div>

  <div id="state-celebration">
    <h1 class="celebration-header">
      Happy Birthday! 🎉
    </h1>
    <div class="message-box" id="message-box">
      <span id="typed-text"></span><span class="cursor" id="cursor"></span>
    </div>
    <button class="cta-btn" onclick="fireConfetti(); this.textContent='🎊 Celebrate Again!'">
      🎊 Celebrate!
    </button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// ENVIRONMENT LIGHTING
// ─────────────────────────────────────────────
function setEnvironmentLighting() {
  const h = new Date().getHours();
  const body = document.body;
  body.classList.remove('morning','day','evening','night');
  if (h >= 5 && h < 8)        body.classList.add('morning');
  else if (h >= 8 && h < 17)  body.classList.add('day');
  else if (h >= 17 && h < 20) body.classList.add('evening');
  else                        body.classList.add('night');
}

setEnvironmentLighting();

// ─────────────────────────────────────────────
// AMBIENT FLOATING STARS (Foreground twinkle)
// ─────────────────────────────────────────────
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'ambient-star';
  const size = Math.random() * 2 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*65}vh;
    left:${Math.random()*100}vw;
    --dur:${(Math.random()*3+1.5).toFixed(1)}s;
    --op:${(Math.random()*0.6+0.4).toFixed(2)};
    animation-delay:${(Math.random()*3).toFixed(1)}s;
  `;
  document.body.appendChild(s);
}

// ─────────────────────────────────────────────
// TARGET DATE (Locked to IST Timezone)
// ─────────────────────────────────────────────
const TARGET = new Date('2026-06-12T00:00:00+05:30').getTime();

// ─────────────────────────────────────────────
// MESSAGES (Dynamic based on time of day)
// ─────────────────────────────────────────────
function getBirthdayMessage() {
  const h = new Date().getHours();
  if (h >= 0 && h < 5) {
    return "Tu soi nahi hai abhi tak 🤨 apne tabiyat ka to khayal rakha kar, btw Happy Birthday Princess Tanya!";
  } else if (h >= 5 && h < 11) {
    return "uth gai🤔! Well good morning then Princess Tanya and happy birthday🎉!";
  } else {
    return "Wishing you a truly magical day filled with joy, laughter, and your favorite things. Happy Birthday Princess Tanya! 🎂✨";
  }
}

// ─────────────────────────────────────────────
// TYPEWRITER
// ─────────────────────────────────────────────
function typeWriter(text, el, cursorEl, i = 0) {
  if (i <= text.length) {
    el.innerHTML = text.substring(0, i).replace(/\n/g, '<br>');
    setTimeout(() => typeWriter(text, el, cursorEl, i + 1), 45);
  } else {
    if (cursorEl) cursorEl.style.display = 'none';
  }
}

// ─────────────────────────────────────────────
// CONFETTI
// ─────────────────────────────────────────────
function fireConfetti() {
  const opts = { startVelocity: 45, spread: 100, ticks: 80, zIndex: 999 };
  confetti({ ...opts, particleCount: 100, origin: { x: 0.2, y: 1 } });
  confetti({ ...opts, particleCount: 80, origin: { x: 0.5, y: 1 }, spread: 140, startVelocity: 55 });
  confetti({ ...opts, particleCount: 100, origin: { x: 0.8, y: 1 } });
  setTimeout(() => confetti({ ...opts, particleCount: 70, origin: { x: 0.35, y: 0.95 }, spread: 70 }), 250);
  setTimeout(() => confetti({ ...opts, particleCount: 70, origin: { x: 0.65, y: 0.95 }, spread: 70 }), 450);
}

// ─────────────────────────────────────────────
// MOUNT CELEBRATION STATE
// ─────────────────────────────────────────────
function mountCelebration() {
  document.getElementById('state-countdown').style.display = 'none';
  document.getElementById('state-celebration').style.display = 'block';
  const msg = getBirthdayMessage();
  const textEl = document.getElementById('typed-text');
  const cursorEl = document.getElementById('cursor');
  typeWriter(msg, textEl, cursorEl);
  setTimeout(fireConfetti, 500);
}

// ─────────────────────────────────────────────
// COUNTDOWN LOOP
// ─────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function startCountdown() {
  const now = Date.now();
  if (now >= TARGET) {
    mountCelebration();
    return;
  }

  let timer;

  function tick() {
    const delta = TARGET - Date.now();
    if (delta <= 0) {
      if (timer) clearInterval(timer);
      mountCelebration();
      return;
    }
    const days  = Math.floor(delta / 86400000);
    const hours = Math.floor((delta % 86400000) / 3600000);
    const mins  = Math.floor((delta % 3600000) / 60000);
    const secs  = Math.floor((delta % 60000) / 1000);
    
    document.getElementById('cd-days').innerText  = pad(days);
    document.getElementById('cd-hours').innerText = pad(hours);
    document.getElementById('cd-mins').innerText  = pad(mins);
    document.getElementById('cd-secs').innerText  = pad(secs);
  }

  tick(); 
  timer = setInterval(tick, 1000);
}

startCountdown();
</script>
</body>
</html>
